# ============================================================================
# Tomorrowland Audio Player - Propiedades de Gradle
# Proyecto educativo para Ingeniería en Sistemas
# ============================================================================

# JVM arguments para Gradle
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Habilitar caché de Gradle para mejor rendimiento
org.gradle.caching=true

# Habilitar AndroidX (requerido para proyectos modernos)
android.useAndroidX=true

# Habilitar compilación paralela para mejor rendimiento
org.gradle.parallel=true

# Configurar caché de configuración (experimental)
org.gradle.configuration-cache=true

# Versión de Kotlin
kotlin.code.style=official

# Non-transitive R classes para mejor rendimiento
android.nonTransitiveRClass=true
